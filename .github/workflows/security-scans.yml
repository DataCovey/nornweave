name: Security Scans

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  schedule:
    - cron: "31 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  dependency-audits:
    name: Dependency Audits (Python + npm)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.7.22"

      - name: Export Python dependency snapshots
        run: |
          uv export --frozen --format requirements-txt --no-hashes --output-file /tmp/requirements-root.txt
          cd clients/python
          uv export --frozen --format requirements-txt --no-hashes --output-file /tmp/requirements-client.txt

      - name: Run pip-audit (root)
        continue-on-error: true
        run: uv run --with pip-audit==2.9.0 pip-audit -r /tmp/requirements-root.txt --format json --output /tmp/pip-audit-root.json

      - name: Run pip-audit (client)
        continue-on-error: true
        run: uv run --with pip-audit==2.9.0 pip-audit -r /tmp/requirements-client.txt --format json --output /tmp/pip-audit-client.json

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install npm dependencies
        working-directory: packages/n8n-nodes-nornweave
        run: npm ci

      - name: Run npm audit (production deps)
        continue-on-error: true
        working-directory: packages/n8n-nodes-nornweave
        run: npm audit --omit=dev --audit-level=high --json > /tmp/npm-audit.json

      - name: Upload dependency audit artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dependency-audits-${{ github.run_id }}
          path: |
            /tmp/pip-audit-root.json
            /tmp/pip-audit-client.json
            /tmp/npm-audit.json
          if-no-files-found: warn

  secret-scan:
    name: Secret Scan (detect-secrets)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install detect-secrets
        run: python -m pip install --disable-pip-version-check detect-secrets==1.5.0

      - name: Run detect-secrets scan
        continue-on-error: true
        run: detect-secrets scan --all-files --force-use-all-plugins > /tmp/detect-secrets.json

      - name: Upload secret scan artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: detect-secrets-${{ github.run_id }}
          path: /tmp/detect-secrets.json
          if-no-files-found: warn
